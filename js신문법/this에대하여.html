<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <button id="버튼">버튼</button>


</body>

<script>
    // 자바스크립트는 사실 보이지않는 window{} 안에서 코드들이 생성됨
    // this의 뜻 1 : 오브젝트 내에서 쓰면 나를 담고있는 오브젝트를 가리킴 / 일반 함수 안에서 쓰면 window를 가리킴

    console.log(this);

    var obj = {
        data: {
            함수() {
                console.log(this)
            }
        }
    }
    obj.data.함수();

    // this의 뜻 2 : 기계 안에서 쓰면 새로 생성되는 오브젝트를 가리킴

    var 어쩌구 = {}

    function 기계() {
        this.이름 = 'Kim'
    }

    var 오브젝트 = new 기계();

    console.log(오브젝트)

    // thus의 뜻 3 : 이벤트 리스너 안에서 쓰면 지금 이벤트가 동작하고 있는 곳을 가리킴

    document.getElementById('버튼').addEventListener('click', function (e) {
        console.log(this);
        console.log(e.currentTarget);

        var array = [1, 2, 3]
        array.forEach(function (a) {
            console.log(this);
        })
    })

    // 애로우 펑션을 쓰면 위에있는 this값을 그대로 물려주는 특징이 있음
    // forEach의 일반함수 내에서 애로우 펑션이 쓰였기 때문에 그 위인 함수 내에서 this가 쓰인 판정으로 오브젝트2 를 가리킴
    // 그래서 e.target 을 써야함
    var 오브젝트2 = {
        이름들: ['김', '이', '박'],
        함수: function () {
            오브젝트2.이름들.forEach(() => {
                console.log(this)
            })
        }
    }
    오브젝트2.함수();
</script>

</html>
