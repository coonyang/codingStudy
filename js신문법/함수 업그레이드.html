<div></div>
<script>

    function 임시함수() {
        return 10
    }

    function 더하기(a, b = 2 * a) { // b 자리에 아무것도 안넣을 경우 x를 넣어주세요 라는 뜻
        console.log(a + b)
    }

    더하기(1)
    더하기(1, 2)

    function 더하기2(a, b = 임시함수()) { // 함수도 넣을 수 있음
        console.log(a + b) // a + 임시함수 리턴값
    }

    더하기2(1)

    function 함수(a, b, c) { // 파라미터 갯수를 뚫어줘야함
        console.log(arguments[0]); // 모든 파라미터를 한꺼번에 잡아서 다루고 싶을 경우 쓰는 arguments
        console.log(arguments[1]); // 모든 파라미터를 감싸 [] 안에 넣어줌
        console.log(arguments[2]);
        console.log(arguments);
    }

    함수(1, 2, 3)

    function 사용처(a, b, c, d, e, f) {
        for (let i = 0; i < arguments.length; i++) {
            console.log(arguments[i])
        }
    }

    사용처(1, 2, 3, 4, 5, 6)


    // rest 파라미터 : arguments와 기능은 같지만 원하는 자리에 있는 변수들만 담을 수 있음
    function 함수2(a, b, ...rest) { // rest 말고 원하는 이름을 넣어도 됨 // rest는 항상 마지막에 써야함
        console.log(rest)
        console.log(rest[0])
    }

    함수2(1, 2, 3, 4, 5, 6, 7, 8)


</script>
