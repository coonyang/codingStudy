<script>

    class 부모 {

    }
    부모.prototype.name = 'Park'

    var 오브젝트 = new 부모(); // 내부적으로 오브젝트에 부모의 프로토타입이 연결됨

    console.log(오브젝트.name) // Park

    var 오브젝트 = { name: 'kim' } // 변수를 재선언 하면 이전의 오브젝트는 사라짐
    Object.getOwnPropertyDescriptor(오브젝트, 'name') // 오브젝트의 숨겨진 내용 꺼내기 (오브젝트 안에 있는 name의 상세 정보를 줌)
    // value: "kim", 실제 데이터 값
    // writable: true, 값을 나중에 변경 가능한지 여부
    // enumerable: true, 반복문이나 Object.keys()등을 쓸 때 이 속성이 노출되는지 여부
    // configurable: true 속성을 삭제하거나 설정을 변경할 수 있는지 여부

    function 기계(이름) {
        this.name = 이름;
        this.age = 15;
        this.sayHi = function () {
            console.log('안녕하세요' + this.name + '입니다')
        }
    }
    기계.prototype.gender = '남' // gender 라는 프로토타입에 남 을 저장

    var 학생1 = new 기계('Park');
    var 학생2 = new 기계('Kim');

    console.log(학생1.gender) // 남

    var arr = [1, 2, 3]
    var arr = new Array(1, 2, 3)

    console.log(학생1.__proto__) // 프로토타입 보는법 // 그냥 학생1 콘솔창 들어가도 있음

    var obj = {}
    var proto = {
        sayHi() {
            console.log('안녕')
        }
    }

    Object.setPrototypeOf(obj, proto) // obj 에 프로토타입 주입
    obj.sayHi()

    // 더 간단하게 하는 법
    var 부모 = { name: 'kim' }
    var 자식 = Object.create(부모)
    자식.age = 20
    var 손자 = Object.create(자식)
    console.log(자식.name) // 자식에 아무것도 안넣었지만 부모프로토타입이 주입됨
    console.log(손자.name, 손자.age)







</script>
